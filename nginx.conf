upstream docgen {
    server api:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;  # Max upload size template

    # Gzip
    gzip on;
    gzip_types application/json application/pdf;

    location / {
        proxy_pass http://docgen;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout cho render lớn
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check không log
    location /health {
        proxy_pass http://docgen;
        access_log off;
    }
}
